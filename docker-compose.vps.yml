name: mathanimate

services:
  api:
    restart: unless-stopped

  worker:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  rabbitmq:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  ollama:
    restart: unless-stopped

  docker-daemon:
    restart: unless-stopped

  frontend:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - frontend

volumes:
  caddy_data:
