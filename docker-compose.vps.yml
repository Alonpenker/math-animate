name: mathanimate

services:
  seq:
    image: datalust/seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: "${SEQ_ADMIN_PASSWORD_HASH}"
      SEQ_API_CANONICALURI: "${SEQ_API_CANONICALURI:-https://api.mathanimate.com/seq}"
    volumes:
      - seq_data:/data

  api:
    restart: unless-stopped
    depends_on:
      seq:
        condition: service_started

  worker:
    restart: unless-stopped
    depends_on:
      seq:
        condition: service_started

  redis:
    restart: unless-stopped

  rabbitmq:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  ollama:
    restart: unless-stopped

  docker-daemon:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  seq_data:
