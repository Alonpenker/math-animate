name: mathanimate

services:
  api:
    restart: unless-stopped

  worker:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  rabbitmq:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  ollama:
    restart: unless-stopped

  docker-daemon:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
