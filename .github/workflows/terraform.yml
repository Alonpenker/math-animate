name: Terraform

on:
  # Auto-apply when infrastructure files change on main
  push:
    branches: [main]
    paths:
      - "infrastructure/**"

  # Plan only on PRs that touch infrastructure
  pull_request:
    paths:
      - "infrastructure/**"

  # Manual apply at any time
  workflow_dispatch:

concurrency:
  group: terraform-prod
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write  # Required to post plan output as PR comment

env:
  TF_WORKING_DIR: infrastructure/envs/prod
  TF_VERSION: "1.9.0"

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-terraform-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── terraform init ────────────────────────────────────────────────────────
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false

      # ── terraform fmt check ───────────────────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff
        continue-on-error: false

      # ── terraform validate ────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── terraform plan (PRs and main pushes) ──────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -no-color \
            2>&1 | tee plan-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "${GITHUB_OUTPUT}"
        continue-on-error: true

      # ── Post plan as PR comment ────────────────────────────────────────────────
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exit_code }}';

            const status = exitCode === '0' ? 'Success' : exitCode === '2' ? 'Changes pending' : 'Failed';
            const emoji  = exitCode === '0' ? '✅' : exitCode === '2' ? '⚠️' : '❌';

            const body = [
              `## Terraform Plan ${emoji} ${status}`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```hcl',
              planOutput.substring(0, 65000),  // GitHub comment limit
              '```',
              '',
              '</details>',
              '',
              `*Triggered by: \`${context.eventName}\` on \`${context.ref}\`*`,
            ].join('\n');

            // Delete previous plan comments to keep the PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments) {
              if (comment.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      # ── Fail the workflow if plan failed ──────────────────────────────────────
      - name: Check Plan Result
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: |
          echo "Terraform plan failed with exit code ${{ steps.plan.outputs.exit_code }}"
          exit 1

      # ── terraform apply (main pushes and manual dispatch only) ────────────────
      - name: Terraform Apply
        if: >
          github.event_name != 'pull_request' &&
          steps.plan.outputs.exit_code == '2'
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan

      - name: No changes to apply
        if: >
          github.event_name != 'pull_request' &&
          steps.plan.outputs.exit_code == '0'
        run: echo "No infrastructure changes to apply."
