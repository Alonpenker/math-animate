name: Deploy

# ── Trigger: MANUAL ONLY ──────────────────────────────────────────────────────
# This workflow builds and deploys the full application stack in order:
#   1. Build & push Docker images to Docker Hub
#   2. Deploy EC2 worker (reboot to pull latest image)
#   3. Deploy API (force new ECS deployment, wait for stability)
#   4. Deploy frontend (build and publish to Cloudflare Pages)
#
# Prerequisites: infrastructure must be provisioned via apply.yml before running.
#
on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ── Build & Push Images ────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
          role-session-name: github-deploy-${{ github.run_id }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch DockerHub credentials from Secrets Manager
        run: |
          DH=$(aws secretsmanager get-secret-value \
            --region eu-north-1 \
            --secret-id "mathanimate/prod/dockerhub-credentials" \
            --query SecretString --output text)
          DH_USER=$(echo "$DH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['username'])")
          DH_TOKEN=$(echo "$DH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['password'])")
          echo "::add-mask::${DH_TOKEN}"
          echo "DOCKERHUB_USERNAME=${DH_USER}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_TOKEN=${DH_TOKEN}" >> "$GITHUB_ENV"

      - name: Build and push images
        run: |
          chmod +x infrastructure/scripts/build-and-push.sh
          ./infrastructure/scripts/build-and-push.sh

  # ── Deploy EC2 Worker ─────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy EC2 Worker
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
          role-session-name: github-deploy-worker-${{ github.run_id }}

      - name: Reboot worker instance
        timeout-minutes: 15
        run: |
          chmod +x infrastructure/scripts/deploy-worker.sh
          ./infrastructure/scripts/deploy-worker.sh

  # ── Deploy API (ECS) ──────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy ECS API
    runs-on: ubuntu-latest
    needs: [deploy-worker]

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
          role-session-name: github-deploy-api-${{ github.run_id }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "mathanimate-prod-cluster" \
            --service "mathanimate-prod-api" \
            --force-new-deployment \
            --region "eu-north-1"

          echo "ECS deployment triggered for service: mathanimate-prod-api"

      - name: Wait for ECS service to stabilise
        run: |
          echo "Waiting for ECS service to reach steady state..."
          aws ecs wait services-stable \
            --cluster "mathanimate-prod-cluster" \
            --services "mathanimate-prod-api" \
            --region "eu-north-1"
          echo "ECS service is stable."

  # ── Deploy Frontend ────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-api]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
          role-session-name: github-deploy-frontend-${{ github.run_id }}

      - name: Fetch x-api-key from Secrets Manager
        run: |
          X_API_KEY=$(aws secretsmanager get-secret-value \
            --region eu-north-1 \
            --secret-id "mathanimate/prod/x-api-key" \
            --query SecretString --output text)
          echo "::add-mask::${X_API_KEY}"
          echo "VITE_X_API_KEY=${X_API_KEY}" >> "$GITHUB_ENV"

      - name: Build frontend
        run: VITE_API_BASE_URL="https://api.mathanimate.com/api/v1" npm run build

      - name: Fetch Cloudflare credentials from Secrets Manager
        run: |
          CF=$(aws secretsmanager get-secret-value \
            --region eu-north-1 \
            --secret-id "mathanimate/prod/cloudflare-credentials" \
            --query SecretString --output text)
          CF_TOKEN=$(echo "$CF" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['api_token'])")
          CF_ACCOUNT=$(echo "$CF" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['account_id'])")
          echo "::add-mask::${CF_TOKEN}"
          echo "::add-mask::${CF_ACCOUNT}"
          echo "CLOUDFLARE_API_TOKEN=${CF_TOKEN}" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=${CF_ACCOUNT}" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4 deploy
