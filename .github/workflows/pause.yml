name: Pause (Partial Teardown)

# ── Trigger: MANUAL ONLY ──────────────────────────────────────────────────────
# This workflow destroys all metered AWS resources while preserving:
#   - ECR repositories and images
#   - S3 artifact bucket (and its objects)
#   - IAM roles
#   - Secrets Manager entries
#
# To resume: run the terraform.yml workflow (manual dispatch → terraform apply)
# then run the deploy.yml workflow (manual dispatch).
#
# WARNING: This destroys the RDS database. All job history is lost.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'PAUSE' to confirm partial teardown"
        required: true
        type: string

concurrency:
  group: terraform-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: infrastructure/envs/prod
  TF_VERSION: "1.9.0"

jobs:
  pause:
    name: Pause Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # ── Safety guard ──────────────────────────────────────────────────────────
      - name: Verify confirmation input
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "PAUSE" ]]; then
            echo "ERROR: Confirmation input must be exactly 'PAUSE'. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with partial teardown..."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-pause-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false

      # ── Show what will be destroyed ────────────────────────────────────────────
      - name: Terraform Destroy Plan (preview)
        run: |
          echo "==> The following modules will be destroyed:"
          echo ""
          echo "  - module.ecs          (ECS cluster, service, task definition)"
          echo "  - module.ec2_worker   (EC2 worker instance)"
          echo "  - module.alb          (Application Load Balancer)"
          echo "  - module.rds          (RDS PostgreSQL — DATA WILL BE LOST)"
          echo "  - module.elasticache  (ElastiCache Redis)"
          echo "  - module.sqs          (SQS queues)"
          echo "  - module.security_groups"
          echo "  - module.networking   (VPC, subnets, endpoints)"
          echo ""
          echo "==> The following resources will be PRESERVED:"
          echo ""
          echo "  - module.iam          (IAM roles and policies)"
          echo "  - module.s3           (S3 artifact bucket and objects)"
          echo "  - ECR repositories and images"
          echo "  - Secrets Manager entries"
          echo ""
          echo "==> Starting targeted destroy in 10 seconds..."
          sleep 10

      # ── Targeted destroy: remove only expensive modules ────────────────────────
      - name: Terraform Destroy (targeted)
        run: |
          terraform destroy \
            -auto-approve \
            -input=false \
            -target=module.ecs \
            -target=module.ec2_worker \
            -target=module.alb \
            -target=module.rds \
            -target=module.elasticache \
            -target=module.sqs \
            -target=module.security_groups \
            -target=module.networking

      - name: Teardown complete
        run: |
          echo ""
          echo "==> Infrastructure paused successfully."
          echo ""
          echo "    All metered resources have been destroyed."
          echo "    ECR images, S3 artifacts, IAM, and Secrets Manager are intact."
          echo ""
          echo "==> To resume:"
          echo "    1. Go to Actions → Terraform → Run workflow (applies infrastructure)"
          echo "    2. Go to Actions → Deploy → Run workflow (deploys application)"
          echo ""
          echo "    Resume requires no image builds or secret re-provisioning."
