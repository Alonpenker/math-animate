name: mathanimate-worker

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"]
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q nomic-embed-text"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  docker-daemon:
    image: docker:dind
    privileged: true
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        dockerd-entrypoint.sh \
          --host unix:///var/run/docker.sock \
          --log-level=warn &
        daemon_pid=$$!
        until docker info >/dev/null 2>&1; do sleep 1; done
        docker pull "manimcommunity/manim:v0.19.2"
        wait "$$daemon_pid"
    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKER_HOST: unix:///var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1 && docker image inspect manimcommunity/manim:v0.19.2 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
      - docker_sock:/var/run
      - render_data:/job

  worker:
    image: ${WORKER_IMAGE_URI}
    restart: unless-stopped
    network_mode: host
    command: ["uv", "run", "celery", "-A", "app.workers.worker", "worker", "--loglevel=info"]
    depends_on:
      ollama:
        condition: service_healthy
      docker-daemon:
        condition: service_healthy
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      OLLAMA_BASE_URL: http://localhost:11434
    env_file: .env
    volumes:
      - docker_sock:/var/run
      - render_data:/job

volumes:
  ollama_data:
  docker_sock:
  render_data:
