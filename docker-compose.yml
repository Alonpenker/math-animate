name: manim-generator-backend

services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    command: ["uv","run","uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build:
      context: .
    command: ["uv", "run", "celery", "-A", "app.workers.worker", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      docker-daemon:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://docker-daemon:2375
    env_file:
      - .env
    volumes:
      - render_data:/job

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log_levels [{connection,warning}]"
    healthcheck:
      test: ["CMD-SHELL","rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: manim
      POSTGRES_USER: manim
      POSTGRES_PASSWORD: manim
    command: ["postgres", "-c", "log_min_messages=WARNING"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U manim"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001","--quiet"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
  
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_DEBUG: 0
      OLLAMA_LOG_LEVEL: ERROR
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve > /dev/null 2>&1 & sleep 5 && ollama pull nomic-embed-text && wait"]
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q nomic-embed-text"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - ollama_data:/root/.ollama

  docker-daemon:
    image: docker:dind
    privileged: true
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        dockerd-entrypoint.sh &
        daemon_pid=$$!
        until docker info >/dev/null 2>&1; do sleep 1; done
        docker pull "manimcommunity/manim:v0.19.2"
        wait "$$daemon_pid"
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - render_data:/job
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1 && docker image inspect \"manimcommunity/manim:v0.19.2\" >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


volumes:
  rabbitmq_data:
  postgres_data:
  minio_data:
  render_data:
  ollama_data:
